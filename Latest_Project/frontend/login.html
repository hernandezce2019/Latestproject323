<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <!-- Link to external CSS file -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class ="login-body">
  <div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" name="username" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
  <script>
    // Get the backend API URL from the current host (same machine, different port)
    const apiUrl = `http://${window.location.hostname}:8000`;

    
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = form.querySelector('input[name="username"]').value;
      const password = form.querySelector('input[name="password"]').value;
      
      // Create form data for OAuth2PasswordRequestForm
      const formData = new FormData();
      formData.append('username', username);
      formData.append('password', password);
      
      try {
        const res = await fetch(`${apiUrl}/login/login`, {
          method: 'POST',
          body: formData
        });
        if (res.ok) {
          const data = await res.json();
          alert(`Login successful! Role: ${data.role}`);
          // Store token for future requests
          localStorage.setItem('token', data.access_token);
          // Redirect based on response
          if (data.redirect) {
            window.location.href = data.redirect;
          } else {
            window.location.href = 'home.html';
          }
        } else {
          const err = await res.json();
          alert('Login failed: ' + (err.detail || JSON.stringify(err)));
        }
      } catch (err) {
        console.error(err);
        alert('Error connecting to server at ' + apiUrl);
      }
    });
  </script>
</body>
</html>
